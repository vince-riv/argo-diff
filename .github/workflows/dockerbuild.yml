---
name: Docker build

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'
    branches: [main]
    paths:
      - '**/**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/dockerbuild.yml'
      - 'Dockerfile'
      - 'Dockerfile.no-build'
  pull_request:
    branches: [main]
    paths:
      - '**/**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/dockerbuild.yml'
      - 'Dockerfile'
      - 'Dockerfile.no-build'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, commit, or tag to checkout'
        required: true

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: us-east-1
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  go-build-and-docker-buildx:
    runs-on: ubuntu-latest
    #runs-on: [self-hosted]
    permissions:
      contents: read
      packages: write
    steps:
      -
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: '50'
          fetch-tags: 'true'
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
      - name: Get version from git describe
        id: version
        run: |
          VERSION=$(git describe --always --dirty --exclude 'chart-*' --exclude 'actions-*')
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"
      - name: Build linux/amd64
        run: go build -o temp/argo-diff-$GOOS-$GOARCH -ldflags "-extldflags '-static' -X 'main.Version=${{ steps.version.outputs.VERSION }}'" -v ./cmd/
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: amd64
      - name: Build linux/arm64
        if: ${{ github.event_name != 'pull_request' }} ## don't build multi-arch on PRs
        run: go build -o temp/argo-diff-$GOOS-$GOARCH -ldflags "-extldflags '-static' -X 'main.Version=${{ steps.version.outputs.VERSION }}'" -v ./cmd/
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: arm64
      - name: Build linux/s390x
        if: ${{ github.event_name != 'pull_request' }} ## don't build multi-arch on PRs
        run: go build -o temp/argo-diff-$GOOS-$GOARCH -ldflags "-extldflags '-static' -X 'main.Version=${{ steps.version.outputs.VERSION }}'" -v ./cmd/
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: s390x
      - name: Build linux/ppc64le
        if: ${{ github.event_name != 'pull_request' }} ## don't build multi-arch on PRs
        run: go build -o temp/argo-diff-$GOOS-$GOARCH -ldflags "-extldflags '-static' -X 'main.Version=${{ steps.version.outputs.VERSION }}'" -v ./cmd/
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: ppc64le

      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      -
        name: Log in to container register
        id: login-ghcr
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      -
        name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=schedule
            type=ref,event=branch
            type=sha,event=branch
            type=raw,event=branch,value=${{ steps.version.outputs.VERSION }}
            type=ref,event=tag
            type=ref,event=pr
            type=sha,event=pr
      -
        name: Build and push linux/amd64
        if: ${{ github.event_name == 'pull_request' }} ## only push amd64 on PRs
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: Dockerfile.no-build
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
      -
        name: Build and push multi-arch
        if: ${{ github.event_name != 'pull_request' }} ## push multi-arch when not a PR
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: Dockerfile.no-build
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64,linux/s390x,linux/ppc64le
